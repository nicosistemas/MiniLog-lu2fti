<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MiniLog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #000000;
            color: #FFFFFF;
        }

        .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        form {
            display: inline-block;
            text-align: left;
        }

        input, select {
            margin: 10px 0;
            padding: 8px;
            font-size: 1.2em;
            width: 100%;
            background-color: #333333;
            color: #FFFFFF;
            border: 1px solid #555555;
        }

        .row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
        }

        .row input, .row select {
            width: 150px;
            text-align: center;
        }

        .row2 input {
            width: 250px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }

        table {
            margin-top: 20px;
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #555555;
        }

        th, td {
            padding: 8px;
            text-align: center;
            background-color: #222222;
        }

        .export-button {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
        }

        .export-button button {
            background-color: #007BFF;
            padding: 8px 16px;
            font-size: 1em;
        }

        .operator-id {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        .save-button-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        a {
            color: #FFFFFF;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .utc-time {
            color: #FFFFFF;
            font-size: 1.2em;
            margin-right: 15px;
        }

        #operator_id_input {
            width: 90px;
            text-align: center;
        }

        .contacts-header {
            margin-top: 60px;
        }

        .actions a {
            margin: 0 5px;
        }
    </style>
</head>
<body>

    <h1>MiniLog</h1>
    <p style="font-size: 0.9em;">
        by <a href="https://github.com/nicosistemas/MiniLog-lu2fti/tree/main" target="_blank">LU2FTI</a>
    </p>

    <div class="container">
        <!-- Operator ID -->
        <div class="operator-id">
            <form method="POST" action="/" id="operatorForm">
                <label>ID:</label>
                <input type="text" name="operator_id" id="operator_id_input" value="{{ operator_id }}" required>
            </form>
        </div>

        <!-- Export + UTC -->
        <div class="export-button">
            <span class="utc-time" id="utc-time">Hora UTC: --:--:--</span>
            <a href="/export">
                <button>Exportar ADIF</button>
            </a>
        </div>
    </div>

    <!-- Formulario -->
    <form method="post">
        <div class="row">
            <input type="text" name="id" placeholder="ID Call" required id="contact_id_input">
        </div>

        <div class="row row2">
            <select name="mode" required>
                <option value="SSB" {% if last_mode == 'SSB' %}selected{% endif %}>SSB</option>
                <option value="CW" {% if last_mode == 'CW' %}selected{% endif %}>CW</option>
                <option value="FT8" {% if last_mode == 'FT8' %}selected{% endif %}>FT8</option>
                <option value="FM" {% if last_mode == 'FM' %}selected{% endif %}>FM</option>
            </select>

            <input type="text" name="frequency" placeholder="Frecuencia MHz (7.074)" value="{{ last_frequency }}" required>
            <input type="text" name="extra" placeholder="Notas">
        </div>

        <div class="save-button-container">
            <button type="submit">Guardar</button>
        </div>
    </form>

    <!-- Tabla -->
    <h2 class="contacts-header">Contactos Realizados</h2>

    <table>
        <tr>
            <th>Fecha</th>
            <th>ID</th>
            <th>Modo</th>
            <th>Frecuencia</th>
            <th>Notas</th>
            <th>Acciones</th>
        </tr>

        {% for i, c in contacts %}
        <tr>
            <td>{{ c[0] }}</td>
            <td>
                <a href="https://www.qrz.com/db/{{ c[1] }}" target="_blank">
                    {{ c[1] }}
                </a>
            </td>
            <td>{{ c[2] }}</td>
            <td>{{ c[3] }}</td>
            <td>{{ c[4] }}</td>
            <td class="actions">
                <a href="/edit/{{ i }}">✏️</a>
                <a href="/delete/{{ i }}">🗑️</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <script>
        document.getElementById("contact_id_input").focus();

        function showUTC() {
            const utcDate = new Date().toISOString();
            const utcTime = utcDate.substring(11, 19);
            document.getElementById("utc-time").innerText = "Hora UTC: " + utcTime;
        }

        setInterval(showUTC, 1000);
        showUTC();
    </script>

</body>
</html>
